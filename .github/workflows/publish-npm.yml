name: Publish npm Package

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Print publish context
        shell: bash
        run: |
          echo "event=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "sha=${GITHUB_SHA}"
          echo "package_version=$(node -p 'require(\"./package.json\").version')"

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package.json version v${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Verify package version is not already published
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} is already published on npm."
            echo "Bump package.json version before publishing again."
            exit 1
          fi

      - name: Resolve npm dist-tag
        id: dist_tag
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [[ "$PACKAGE_VERSION" == *"-"* ]]; then
            DIST_TAG="${PACKAGE_VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
          else
            DIST_TAG="latest"
          fi
          echo "dist_tag=${DIST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${PACKAGE_VERSION} with npm dist-tag ${DIST_TAG}"

      - name: Publish to npm
        run: npm publish --access public --provenance --tag "${{ steps.dist_tag.outputs.dist_tag }}"
